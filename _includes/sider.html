<div class="col-xs-3">
  <ul class="nav nav-list" id="article-tree">
    <li class="nav-header"><big><b>文章目录</b></big></li>
    <hr>
    {% assign categories = site.categories | sort %}
    {% for category in categories %}
      <li class="category-item">
        <a href="/category/#{{ category[0] }}"><strong>{{ category[0] }}</strong></a>
        <ul class="nav nav-list category-posts">
        {% for post in category[1] %}
          <li><a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></li>
        {% endfor %}
        </ul>
      </li>
    {% endfor %}
    <hr>
      <li class="nav-header"><big><b>Links</b></big></li>

    <li><a href="https://github.com/shunliz">shunliz's  github</a></li>
	<li><a href="/books">我的书单</a></li>
  </ul>
</div>
